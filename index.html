<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoTrack SaaS</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{background:#080810;color:#fff;font-family:sans-serif;padding:20px}
button{padding:10px;border-radius:8px;border:none;background:#00f5a0;font-weight:bold;margin:5px;cursor:pointer}
.card{background:#111;padding:15px;border-radius:10px;margin-top:10px}
.big{font-size:26px;font-weight:800}
</style>
</head>

<body>

<h2>🚀 MotoTrack SaaS</h2>

<div id="auth">
  <button onclick="login()">Login con Google</button>
</div>

<div id="app" style="display:none">

  <button onclick="logout()">Cerrar sesión</button>
  <button onclick="addTest()">Agregar día prueba</button>

  <div id="dashboard"></div>
  <div id="days"></div>

</div>

<script>

// 🔥 TU FIREBASE (YA LISTO)
const firebaseConfig = {
  apiKey: "AIzaSyAhuE1hw1xshm9MK1sItY9PAVvcLLKqkh4",
  authDomain: "mototrack-50dd1.firebaseapp.com",
  projectId: "mototrack-50dd1",
  storageBucket: "mototrack-50dd1.firebasestorage.app",
  messagingSenderId: "506501390826",
  appId: "1:506501390826:web:9805a13f707fb45729d293"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let USER = null;
let DAYS = [];

// 🔐 LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// 🔐 LOGOUT
function logout(){
  auth.signOut();
}

// 🔄 SESSION
auth.onAuthStateChanged(user=>{
  if(user){
    USER = user;
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    loadData();
  }else{
    USER = null;
    document.getElementById("auth").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

// 💾 GUARDAR DÍA
async function saveDay(day){
  await db.collection("days").add({
    userId: USER.uid,
    ...day,
    createdAt: new Date()
  });
}

// 📥 CARGAR
async function loadData(){
  const snap = await db.collection("days")
    .where("userId","==",USER.uid)
    .orderBy("createdAt","desc")
    .get();

  DAYS = [];
  snap.forEach(doc=>{
    DAYS.push(doc.data());
  });

  render();
}

// 🧪 TEST
function addTest(){
  const d = {
    date: new Date().toLocaleDateString(),
    total: Math.floor(Math.random()*1000+200)
  };

  saveDay(d).then(loadData);
}

// 📊 DASHBOARD REAL
function render(){

  if(!DAYS.length){
    document.getElementById("dashboard").innerHTML = "Sin datos";
    return;
  }

  const total = DAYS.reduce((s,d)=>s+d.total,0);
  const avg = total / DAYS.length;
  const best = Math.max(...DAYS.map(d=>d.total));

  document.getElementById("dashboard").innerHTML = `
    <div class="card">
      <div class="big">$${Math.round(total)}</div>
      Total generado
    </div>

    <div class="card">
      Promedio: <b>$${Math.round(avg)}</b>
    </div>

    <div class="card">
      Mejor día: <b>$${best}</b>
    </div>
  `;

  let html = "";

  DAYS.forEach(d=>{
    html += `
      <div class="card">
        ${d.date} → $${d.total}
      </div>
    `;
  });

  document.getElementById("days").innerHTML = html;
}

</script>

</body>
</html>
