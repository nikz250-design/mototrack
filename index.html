<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoTrack v2</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
  background:#080810;
  color:#fff;
  font-family:sans-serif;
  padding:20px;
}
button{
  padding:10px;
  border-radius:8px;
  border:none;
  background:#00f5a0;
  font-weight:bold;
}
.card{
  background:#111;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>🚀 MotoTrack v2</h2>

<button onclick="loginGoogle()">Login con Google</button>
<button onclick="addTestDay()">Agregar día prueba</button>

<div id="data"></div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAhuE1hw1xshm9MK1sItY9PAVvcLLKqkh4",
  authDomain: "mototrack-50dd1.firebaseapp.com",
  projectId: "mototrack-50dd1",
  storageBucket: "mototrack-50dd1.firebasestorage.app",
  messagingSenderId: "506501390826",
  appId: "1:506501390826:web:9805a13f707fb45729d293"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

// 🔐 LOGIN
function loginGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then((result) => {
      currentUser = result.user;
      alert("Login exitoso");
      loadUserData();
    })
    .catch((err) => {
      console.error(err);
    });
}

// 🔄 SESIÓN
auth.onAuthStateChanged(user => {
  if(user){
    currentUser = user;
    loadUserData();
  }
});

// 💾 GUARDAR
async function saveDay(day){
  if(!currentUser){
    alert("Haz login primero");
    return;
  }

  await db.collection("days").add({
    userId: currentUser.uid,
    ...day,
    createdAt: new Date()
  });

  alert("Guardado");
  loadUserData();
}

// 📥 CARGAR
async function loadUserData(){
  if(!currentUser) return;

  const snapshot = await db
    .collection("days")
    .where("userId","==",currentUser.uid)
    .get();

  let html = "<h3>Tus datos:</h3>";

  snapshot.forEach(doc=>{
    const d = doc.data();
    html += `
      <div class="card">
        ${d.day_name} - $${d.total}
      </div>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

// 🧪 TEST
function addTestDay(){
  const day = {
    date:"12/04/2026",
    day_name:"Dom",
    hours_connected:10,
    trips:15,
    tarifa_neta:500,
    incentivos:100,
    propinas:50,
    impuestos:30,
    total:620
  };

  saveDay(day);
}

</script>

</body>
</html>
