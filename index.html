<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MotoTrack</title>
</head>

<body style="background:#111;color:white;font-family:sans-serif;padding:20px">

<h2>MotoTrack IA 🚀</h2>

<input type="file" id="fileInput" multiple>
<button onclick="analyzeImages()">Analizar</button>
<button onclick="generateInsights()">Insights</button>

<p id="uploadCounter"></p>

<script>

// =============================
let selectedFiles = [];
let pendingAIDays = [];

// =============================
document.getElementById('fileInput').addEventListener('change', (e)=>{
  selectedFiles = Array.from(e.target.files).slice(0,10);
  renderPreviews();
});

function renderPreviews(){
  document.getElementById('uploadCounter').textContent =
    `${selectedFiles.length}/10 imágenes`;
}

// =============================
// ANALYZE (FIX + DEBUG)
// =============================
async function analyzeImages(){

  if(selectedFiles.length === 0){
    alert("No hay imágenes");
    return;
  }

  console.log("🚀 Iniciando análisis");

  const BATCH = 3;
  pendingAIDays = [];

  for(let i=0;i<selectedFiles.length;i+=BATCH){

    const batch = selectedFiles.slice(i,i+BATCH);
    console.log("📦 Batch:", batch);

    const images = await Promise.all(batch.map(async f=>{
      return {
        type:'image',
        source:{
          type:'base64',
          media_type:'image/jpeg',
          data: await fileToBase64(f)
        }
      }
    }));

    try{

      const res = await fetch('/api/analyze',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({images})
      });

      console.log("📡 STATUS:", res.status);

      const text = await res.text();
      console.log("📡 RAW RESPONSE:", text);

      if(!res.ok){
        alert("Error API: " + text);
        return;
      }

      const data = JSON.parse(text);

      if(!data.days){
        alert("Respuesta inválida de la API");
        return;
      }

      data.days.forEach(d=>{
        const exists = pendingAIDays.find(x=>x.date===d.date);
        if(!exists) pendingAIDays.push(d);
      });

    }catch(err){
      console.error("❌ ERROR:", err);
      alert("Error en análisis: " + err.message);
    }
  }

  console.log("✅ RESULTADO FINAL:", pendingAIDays);
  alert("Análisis terminado");
}

// =============================
// INSIGHTS
// =============================
async function generateInsights(){

  if(pendingAIDays.length === 0){
    alert("Primero analiza datos");
    return;
  }

  try{
    const res = await fetch('/api/insights',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        stats: pendingAIDays
      })
    });

    const text = await res.text();
    console.log("INSIGHTS RAW:", text);

    if(!res.ok){
      alert("Error insights: " + text);
      return;
    }

    const data = JSON.parse(text);
    console.log("INSIGHTS:", data);

    alert("Insights generados (ver consola)");

  }catch(err){
    console.error(err);
    alert("Error insights");
  }
}

// =============================
// HELPERS
// =============================
function fileToBase64(file){
  return new Promise((res)=>{
    const r = new FileReader();
    r.onload = ()=> res(r.result.split(',')[1]);
    r.readAsDataURL(file);
  });
}

</script>

</body>
</html>
