<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoTrack v3</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{background:#080810;color:#fff;font-family:sans-serif;padding:20px}
button{padding:10px;border-radius:8px;border:none;background:#00f5a0;font-weight:bold;margin:5px}
.card{background:#111;padding:12px;border-radius:10px;margin-top:10px}
.big{font-size:22px;font-weight:800}
</style>
</head>

<body>

<h2>🚀 MotoTrack v3</h2>

<button onclick="loginGoogle()">Login</button>
<button onclick="addTestDay()">Agregar día prueba</button>

<div id="stats"></div>
<div id="list"></div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAhuE1hw1xshm9MK1sItY9PAVvcLLKqkh4",
  authDomain: "mototrack-50dd1.firebaseapp.com",
  projectId: "mototrack-50dd1",
  storageBucket: "mototrack-50dd1.firebasestorage.app",
  messagingSenderId: "506501390826",
  appId: "1:506501390826:web:9805a13f707fb45729d293"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let USER_DAYS = [];

// 🔐 LOGIN
function loginGoogle(){
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(res=>{
      currentUser = res.user;
      alert("Login exitoso");
      loadUserData();
    })
    .catch(err=>console.error(err));
}

// 🔄 SESSION
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user;
    loadUserData();
  }
});

// 💾 SAVE
async function saveDay(day){
  if(!currentUser){
    alert("Login primero");
    return;
  }

  await db.collection("days").add({
    userId: currentUser.uid,
    ...day,
    createdAt: new Date()
  });

  loadUserData();
}

// 📥 LOAD
async function loadUserData(){
  if(!currentUser) return;

  const snap = await db.collection("days")
    .where("userId","==",currentUser.uid)
    .get();

  USER_DAYS = [];

  snap.forEach(doc=>{
    USER_DAYS.push(doc.data());
  });

  render();
}

// 🧠 GET DATA
function getDays(){
  if(USER_DAYS.length>0) return USER_DAYS;

  // fallback fake
  return [
    {day_name:"Lun",total:500},
    {day_name:"Mar",total:700},
    {day_name:"Mié",total:300}
  ];
}

// 📊 RENDER
function render(){
  const days = getDays();

  if(!days.length){
    document.getElementById("stats").innerHTML = "Sin datos";
    return;
  }

  const total = days.reduce((s,d)=>s+(d.total||0),0);
  const avg = total / days.length;

  document.getElementById("stats").innerHTML = `
    <div class="card">
      <div class="big">$${Math.round(total)}</div>
      Total generado
      <br><br>
      Promedio: $${Math.round(avg)}
    </div>
  `;

  let html = "";

  days.forEach(d=>{
    html += `
      <div class="card">
        ${d.day_name} → $${d.total}
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

// 🧪 TEST
function addTestDay(){
  const d = {
    date:"12/04/2026",
    day_name:"Dom",
    total:Math.floor(Math.random()*800+200)
  };

  saveDay(d);
}

</script>

</body>
</html>
