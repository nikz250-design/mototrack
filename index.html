<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoTrack SaaS</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{background:#080810;color:#fff;font-family:sans-serif;padding:20px}
.card{background:#111;padding:15px;border-radius:12px;margin-bottom:10px}
.big{font-size:28px;font-weight:800;color:#00f5a0}
button{padding:12px;border:none;border-radius:10px;background:#00f5a0;font-weight:bold;margin-top:10px;width:100%}
input{width:100%;padding:10px;border-radius:8px;border:none;margin-top:5px}
</style>
</head>

<body>

<h2>🚀 MotoTrack SaaS</h2>

<button onclick="login()">Login con Google</button>

<div id="app" style="display:none">

<div id="dashboard"></div>

<div class="card">
  <h3>Agregar día</h3>
  <input id="totalInput" placeholder="Total ganado">
  <button onclick="saveDay()">Guardar</button>
</div>

<div id="history"></div>

</div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAhuE1hw1xshm9MK1sItY9PAVvcLLKqkh4",
  authDomain: "mototrack-50dd1.firebaseapp.com",
  projectId: "mototrack-50dd1",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user = null;
let days = [];

// 🔐 LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(res=>{
      user = res.user;
      init();
    })
    .catch(err=>console.error(err));
}

auth.onAuthStateChanged(u=>{
  if(u){
    user = u;
    init();
  }
});

// 🚀 INIT
function init(){
  document.getElementById("app").style.display="block";
  loadDays();
}

// 💾 SAVE DAY
async function saveDay(){
  const total = parseFloat(document.getElementById("totalInput").value);

  if(!total){
    alert("Ingresa un número");
    return;
  }

  await db.collection("days").add({
    userId: user.uid,
    total,
    createdAt: new Date()
  });

  document.getElementById("totalInput").value = "";
  loadDays();
}

// 📥 LOAD DAYS
async function loadDays(){

  const snap = await db.collection("days")
    .where("userId","==",user.uid)
    .orderBy("createdAt","desc")
    .get();

  days = [];

  snap.forEach(doc=>{
    days.push(doc.data());
  });

  render();
}

// 📊 DASHBOARD
function render(){

  if(days.length === 0){
    document.getElementById("dashboard").innerHTML = `
      <div class="card">Sin datos aún</div>
    `;
    return;
  }

  const total = days.reduce((s,d)=>s+d.total,0);
  const avg = total / days.length;
  const best = days.reduce((a,b)=> a.total>b.total?a:b);

  document.getElementById("dashboard").innerHTML = `
    <div class="card">
      <div class="big">$${Math.round(total)}</div>
      Total generado
    </div>

    <div class="card">
      Promedio diario<br>
      <b>$${Math.round(avg)}</b>
    </div>

    <div class="card">
      Mejor día<br>
      <b>$${best.total}</b>
    </div>
  `;

  let html = "";

  days.forEach(d=>{
    html += `
      <div class="card">
        $${d.total}
      </div>
    `;
  });

  document.getElementById("history").innerHTML = html;
}

</script>

</body>
</html>
