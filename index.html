<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  deleteDoc,
  serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAhuE1hw1xshm9MK1sItY9PAVvcLLKqkh4",
  authDomain: "mototrack-50dd1.firebaseapp.com",
  projectId: "mototrack-50dd1",
  storageBucket: "mototrack-50dd1.firebasestorage.app",
  messagingSenderId: "506501390826",
  appId: "1:506501390826:web:9805a13f707fb45729d293"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

window.auth = auth;
window.db = db;
window.currentUser = null;

onAuthStateChanged(auth, async (user) => {
  if (user) {
    window.currentUser = {
      name: user.displayName || 'Usuario',
      email: user.email || '',
      photo: user.photoURL || null,
      uid: user.uid
    };
    await window.__mtLoadCloudData?.();
    startApp();
  }
});

window.loginWithGoogle = async function () {
  const result = await signInWithPopup(auth, provider);
  window.currentUser = {
    name: result.user.displayName || 'Usuario',
    email: result.user.email || '',
    photo: result.user.photoURL || null,
    uid: result.user.uid
  };
  await window.__mtLoadCloudData?.();
  startApp();
};

window.logout = async function () {
  try { await signOut(auth); } catch (e) {}
  window.currentUser = null;
  document.getElementById('authScreen').classList.remove('hidden');
  document.getElementById('mainApp').style.display = 'none';
  showToast('👋 Sesión cerrada');
};
</script>

<script>
// 2) NUEVAS FUNCIONES DE ALMACENAMIENTO (HÍBRIDO LOCAL + CLOUD)
const MT_CACHE = {
  history: [],
  expenses: [],
  insights: {}
};

function userKey() {
  return window.currentUser?.uid || 'demo';
}

function localHistoryKey() {
  return `mt_v2_${userKey()}`;
}

function getHistory() {
  if (MT_CACHE.history.length) return MT_CACHE.history;
  try {
    return JSON.parse(localStorage.getItem(localHistoryKey()) || '[]');
  } catch {
    return [];
  }
}

function saveHistory(h) {
  MT_CACHE.history = Array.isArray(h) ? h : [];
  localStorage.setItem(localHistoryKey(), JSON.stringify(MT_CACHE.history));
  void syncCloudData();
}

function getExpenses() {
  if (MT_CACHE.expenses.length) return MT_CACHE.expenses;
  try {
    return JSON.parse(localStorage.getItem('mt_exp_v1') || '[]');
  } catch {
    return [];
  }
}

function saveExpensesData(e) {
  MT_CACHE.expenses = Array.isArray(e) ? e : [];
  localStorage.setItem('mt_exp_v1', JSON.stringify(MT_CACHE.expenses));
  void syncCloudData();
}

function getInsightCache() {
  if (Object.keys(MT_CACHE.insights).length) return MT_CACHE.insights;
  try {
    return JSON.parse(localStorage.getItem('mt_ic_v3') || '{}');
  } catch {
    return {};
  }
}

function saveInsightCache(d) {
  MT_CACHE.insights = d && typeof d === 'object' ? d : {};
  localStorage.setItem('mt_ic_v3', JSON.stringify(MT_CACHE.insights));
  void syncCloudData();
}

async function syncCloudData() {
  if (!window.currentUser?.uid || !window.db) return;
  const ref = doc(window.db, 'users', window.currentUser.uid);
  await setDoc(ref, {
    profile: {
      name: window.currentUser.name || '',
      email: window.currentUser.email || '',
      photo: window.currentUser.photo || null,
      uid: window.currentUser.uid
    },
    history: MT_CACHE.history,
    expenses: MT_CACHE.expenses,
    insights: MT_CACHE.insights,
    updatedAt: serverTimestamp()
  }, { merge: true });
}

window.__mtLoadCloudData = async function () {
  if (!window.currentUser?.uid || !window.db) return;

  const ref = doc(window.db, 'users', window.currentUser.uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const data = snap.data() || {};
    MT_CACHE.history = Array.isArray(data.history) ? data.history : [];
    MT_CACHE.expenses = Array.isArray(data.expenses) ? data.expenses : [];
    MT_CACHE.insights = data.insights && typeof data.insights === 'object' ? data.insights : {};
  } else {
    MT_CACHE.history = [];
    MT_CACHE.expenses = [];
    MT_CACHE.insights = {};
  }

  localStorage.setItem(localHistoryKey(), JSON.stringify(MT_CACHE.history));
  localStorage.setItem('mt_exp_v1', JSON.stringify(MT_CACHE.expenses));
  localStorage.setItem('mt_ic_v3', JSON.stringify(MT_CACHE.insights));

  if (document.getElementById('mainApp')?.style.display === 'block') {
    renderHome();
    renderHistory();
    renderGlobal();
    // Intento llamar a funciones de UI opcionales si existen
    if(typeof renderUserAvatar === 'function') renderUserAvatar();
    if(typeof renderProfileCard === 'function') renderProfileCard();
    if(typeof updateApiKeyDisplay === 'function') updateApiKeyDisplay();
  }
};

// ... (El resto de tus funciones buildDashboard, renderHistory, etc. se mantienen igual) ...

// 3) CORRECCIÓN DE "BORRAR TODO"
window.confirmClear = async function () {
  if (!confirm('¿Borrar TODOS los datos? Esta acción no se puede deshacer.')) return;

  const uid = window.currentUser?.uid || 'demo';
  localStorage.removeItem(`mt_v2_${uid}`);
  localStorage.removeItem('mt_exp_v1');
  localStorage.removeItem('mt_ic_v3');

  if (window.currentUser?.uid && window.db) {
    try {
      await deleteDoc(doc(window.db, 'users', window.currentUser.uid));
    } catch (e) {}
  }

  MT_CACHE.history = [];
  MT_CACHE.expenses = [];
  MT_CACHE.insights = {};

  renderHome();
  renderHistory();
  renderGlobal();
  showToast('🗑 Datos eliminados');
};

// ... (Resto del archivo) ...
</script>
</body>
